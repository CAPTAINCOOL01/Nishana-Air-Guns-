<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>My Orders — Nishana Airguns</title>
<meta name="theme-color" content="#0b0e13" />
<meta name="robots" content="noindex,nofollow" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@600;700;800&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="nishana.css" />
<style>
.orders-list{max-width:820px;margin:40px auto;padding:0 24px}
.o-card{background:var(--panel);border:1px solid var(--edge);border-radius:var(--r);overflow:hidden;margin-bottom:14px;position:relative}
.o-card::before{content:"";position:absolute;inset:0 0 auto 0;height:2px;background:linear-gradient(90deg,var(--brass),transparent)}
.o-head{padding:18px 20px;display:flex;justify-content:space-between;align-items:flex-start;gap:14px;border-bottom:1px solid var(--edge);flex-wrap:wrap}
.o-ref{font-family:var(--font-m);font-size:11px;color:var(--smoke);letter-spacing:.1em}
.o-date{color:var(--smoke);font-size:12.5px;margin-top:3px}
.o-amt{font-family:var(--font-d);font-weight:800;font-size:24px;color:var(--brass);line-height:1}
.o-body{padding:16px 20px;display:flex;flex-direction:column;gap:10px}
.o-item{display:flex;gap:12px;align-items:center;padding:10px;background:var(--steel);border:1px solid var(--edge);border-radius:var(--r-sm)}
.o-item img{width:56px;height:56px;object-fit:contain;background:var(--panel);border:1px solid var(--edge);border-radius:8px;padding:5px;flex:none}
.o-item b{font-family:var(--font-d);font-weight:700;text-transform:uppercase;font-size:14px;letter-spacing:.02em}
.o-item small{color:var(--smoke);font-family:var(--font-m);font-size:11px;letter-spacing:.06em;display:block}
.o-foot{padding:12px 20px;background:var(--steel-2);border-top:1px solid var(--edge);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;font-family:var(--font-m);font-size:11px;letter-spacing:.1em;text-transform:uppercase}
.status-chip{display:inline-block;padding:4px 10px;border-radius:20px;border:1px solid transparent;font-size:10.5px;letter-spacing:.14em}
.status-chip.new       {color:#a1a8b3;border-color:rgba(255,255,255,.14);background:rgba(255,255,255,.04)}
.status-chip.confirmed {color:#7ca8dd;border-color:rgba(90,141,214,.35);background:rgba(90,141,214,.12)}
.status-chip.shipped   {color:#e6b972;border-color:rgba(217,164,65,.4);background:rgba(217,164,65,.12)}
.status-chip.delivered {color:#8fd8b3;border-color:rgba(75,179,129,.4);background:rgba(75,179,129,.12)}
.status-chip.cancelled {color:#e78e6f;border-color:rgba(228,87,46,.4);background:rgba(228,87,46,.12)}
.empty-state{text-align:center;padding:60px 30px;color:var(--smoke)}
.empty-state svg{width:56px;height:56px;color:var(--brass);opacity:.5;margin-bottom:14px}
.empty-state h2{font-family:var(--font-d);font-weight:800;text-transform:uppercase;font-size:24px;color:var(--bone);margin:8px 0}
.spinner{width:34px;height:34px;border:3px solid var(--edge);border-top-color:var(--brass);border-radius:50%;animation:spin 1s linear infinite;margin:60px auto}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body data-page="my-orders">
<div data-nishana-header></div>

<nav class="n-crumbs" aria-label="Breadcrumb"><a href="index.html">Home</a><span>›</span>My orders</nav>

<section class="n-hero" style="padding:60px 0 40px">
  <div class="wrap">
    <p class="eyebrow">Your account</p>
    <h1>My <span class="accent">orders.</span></h1>
    <p class="lede">Every order you've placed with Nishana, most recent first. Tap WhatsApp on any order to reach us instantly.</p>
  </div>
</section>

<div class="orders-list" id="ordersList"><div class="spinner"></div></div>

<div data-nishana-footer></div>

<script src="auth.js"></script>
<script src="products.js"></script>
<script src="cart.js"></script>
<script src="layout.js"></script>
<script type="module">
const list = document.getElementById("ordersList");
const inr = n => "₹" + Number(n||0).toLocaleString("en-IN");
const ref = id => "#" + id.slice(0,8).toUpperCase();
const fmt = s => new Date(s).toLocaleString("en-IN",{day:"2-digit",month:"short",year:"numeric",hour:"2-digit",minute:"2-digit"});

let supabase;
try { supabase = await window.getNishanaSupabase(); }
catch (e) {
  list.innerHTML = `<div class="empty-state"><h2>Could not load</h2><p>Check your internet connection or ad-blocker, then reload the page.</p></div>`;
  throw e;
}
const { data: { session } } = await supabase.auth.getSession();
if (!session) {
  list.innerHTML = `
    <div class="empty-state">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
      <h2>Sign in to view your orders</h2>
      <p>Your order history is tied to the account you used at checkout.</p>
      <button class="n-btn" data-login-btn style="margin-top:20px">Sign in</button>
    </div>`;
} else {
  const { data, error } = await supabase.from("orders").select("*").order("created_at",{ascending:false});
  if (error) {
    list.innerHTML = `<div class="empty-state"><h2>Could not load orders</h2><p>${error.message}</p></div>`;
  } else if (!data || data.length === 0) {
    list.innerHTML = `
      <div class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="9" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2 3h3l2.6 13H19l2-9H6"/></svg>
        <h2>No orders yet</h2>
        <p>Once you place an order, it'll appear here.</p>
        <a class="n-btn" href="products.html" style="margin-top:20px">Browse products</a>
      </div>`;
  } else {
    list.innerHTML = data.map(o => {
      const items = (o.items||[]).map(i => `
        <div class="o-item">
          ${i.image?`<img src="${i.image}" alt="" referrerpolicy="no-referrer">`:""}
          <div><b>${i.name}</b><small>Qty ${i.qty||1} · ${inr(i.price)}</small></div>
        </div>`).join("");
      const phoneMsg = encodeURIComponent(`Hi Nishana! I have a question about my order ${ref(o.id)}.`);
      return `
        <div class="o-card">
          <div class="o-head">
            <div>
              <div class="o-ref">${ref(o.id)}</div>
              <div class="o-date">${fmt(o.created_at)}</div>
              <span class="status-chip ${o.order_status}" style="margin-top:8px;display:inline-block">${o.order_status}</span>
            </div>
            <div class="o-amt">${inr(o.total)}</div>
          </div>
          <div class="o-body">${items}</div>
          <div class="o-foot">
            <span>Payment: <b style="color:${o.payment_status==='paid'?'var(--ok)':'var(--warn)'}">${o.payment_method?.toUpperCase()||''} · ${o.payment_status}</b></span>
            <a class="n-btn n-btn--wa" style="font-size:11px;padding:8px 14px" target="_blank" rel="noopener" href="https://wa.me/918329618409?text=${phoneMsg}">Ask on WhatsApp</a>
          </div>
        </div>`;
    }).join("");
  }
}
</script>
</body>
</html>
